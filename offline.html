<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline - Royal Ray Zone</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e5e7eb;display:grid;place-items:center;min-height:100vh;margin:0;padding:24px}
    .card{max-width:680px;background:#111827;border:1px solid #334155;border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    h1{margin-top:0;font-size:28px} p{line-height:1.6;color:#cbd5e1} a{color:#93c5fd}
  </style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>This page is not available without an internet connection yet, or it has not been cached on this device before.</p>
    <p>Return to the dashboard or reconnect, then open the page once online so it can be cached for later offline access.</p>
  </div>
</body>
</html>
